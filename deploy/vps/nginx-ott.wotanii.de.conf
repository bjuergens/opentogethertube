# Host nginx vhost for OpenTogetherTube
# Place in /etc/nginx/sites-available/ott.wotanii.de and symlink to sites-enabled.
# Adjust the ssl_certificate paths to however you manage certs (e.g. certbot).

map $http_upgrade $connection_upgrade {
	default upgrade;
	'' close;
}

server {
	listen 80;
	listen [::]:80;
	server_name ott.wotanii.de;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	listen [::]:443 ssl;
	http2 on;
	server_name ott.wotanii.de;

	ssl_certificate /etc/letsencrypt/live/ott.wotanii.de/fullchain.pem;
	ssl_certificate_key /etc/letsencrypt/live/ott.wotanii.de/privkey.pem;

	location / {
		proxy_pass http://127.0.0.1:8123;
		proxy_http_version 1.1;

		# websocket support (required for room sync)
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection $connection_upgrade;

		proxy_set_header Host $host;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
		proxy_set_header X-Forwarded-Host $host;
		proxy_cache_bypass $http_upgrade;

		# keep long-lived websocket connections alive
		proxy_read_timeout 7d;
		proxy_send_timeout 7d;
		proxy_socket_keepalive on;
	}
}

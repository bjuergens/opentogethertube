services:
  opentogethertube:
    # built from this fork's source, not the upstream docker hub image
    image: opentogethertube:local
    build:
      context: ../..
      dockerfile: deploy/monolith.Dockerfile
      target: docker-stage
      args:
        - GIT_COMMIT=${GIT_COMMIT:-unknown}
    container_name: opentogethertube
    environment:
      - PORT=8080
      - REDIS_HOST=redis_db
      - REDIS_PORT=6379
      - FFPROBE_PATH=/usr/bin/ffprobe
      # postgres
      - POSTGRES_USER=opentogethertube
      - POSTGRES_DB=opentogethertube
      - POSTGRES_HOST=postgres_db
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - DOCKER=1
    volumes:
      - ./env:/app/env
    ports:
      # bind to localhost only, host nginx reverse-proxies to this
      - "127.0.0.1:8123:8080"
    depends_on:
      - redis_db
      - postgres_db
    restart: unless-stopped

  redis_db:
    container_name: opentogethertube_redis
    image: redis
    healthcheck:
      test: "redis-cli ping"
    expose:
      - 6379
    volumes:
      - db-data-redis:/data
    restart: unless-stopped

  postgres_db:
    container_name: opentogethertube_postgres
    image: postgres:15-bullseye
    environment:
      - POSTGRES_DB=opentogethertube
      - POSTGRES_USER=opentogethertube
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: "pg_isready -U opentogethertube"
    expose:
      - 5432
    volumes:
      - db-data-postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data-redis:
    driver: local
  db-data-postgres:
    driver: local
